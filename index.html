  <style>
    :root {
      --bg: #0b0d10;
      --panel: #11151b;
      --accent: #5692ff;
      --text: #e9eef5;
      --muted: rgba(233,238,245,.55);
      --border: rgba(233,238,245,.12);
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(900px 500px at 50% 0%, rgba(86,146,255,.08), transparent 70%), var(--bg);
      color: var(--text);
      display: flex; justify-content: center; min-height: 100vh;
    }

    .wrap { width: min(760px, 92vw); padding: 40px 0; }
    h1 { margin: 0 0 24px; font-weight: 700; text-align: center; font-size: 1.8rem; letter-spacing: -0.5px; }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header-content { position: sticky; top: 0; background: var(--panel); border-radius: var(--radius) var(--radius) 0 0; z-index: 10; padding: 18px 18px 10px; border-bottom: 1px solid var(--border); }
    
    .search { position: relative; margin-bottom: 12px; }
    input {
      width: 100%; padding: 12px 42px; border-radius: 10px; border: 1px solid var(--border);
      outline: none; background: rgba(0,0,0,0.3); color: var(--text); font-size: 16px; transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(86,146,255,0.1); }

    .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted); pointer-events: none; }

    .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); color: var(--muted); font-size: 13px; cursor: pointer; transition: 0.2s;
    }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .list { max-height: 60vh; overflow-y: auto; padding: 10px; }
    .row { display: flex; align-items: center; padding: 14px; border-radius: 10px; transition: background 0.1s; margin-bottom: 2px; }
    .row:hover { background: rgba(255,255,255,.05); }
    .left { display: flex; flex-direction: column; gap: 4px; }
    .main { font-weight: 500; font-size: 15px; }
    mark { background: rgba(86,146,255,0.4); color: #fff; border-radius: 2px; }
    .meta { font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
    .badge { background: rgba(86,146,255,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  </style>
</head>

| Armadale,Roleystone,6111 | Van Drop |`.trim();

    const RECORDS = RAW_BLOCK.split('\n').map(line => {
      const parts = line.replace(/^\||\|$/g, '').split('|').map(s => s.trim());
      const left = parts[0];
      const cage = parts[1];
      const leftParts = left.split(',').map(s => s.trim());
      return { 
        depot: leftParts[0], 
        suburb: leftParts[1], 
        postcode: leftParts[2] || "", 
        cage 
      };
    });

    const fuse = new Fuse(RECORDS, {
      keys: ["suburb", "postcode", "cage"],
      threshold: 0.35
    });

    const $q = document.getElementById("q");
    const $list = document.getElementById("list");
    let currentFilter = "";

    function highlight(text, query) {
      if (!query.trim()) return text;
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }

    function render() {
      const query = $q.value;
      let data = query.trim() ? fuse.search(query).map(x => x.item) : RECORDS;
      
      if (currentFilter) {
        data = data.filter(r => r.cage.includes(currentFilter));
      }

      const results = data.slice(0, 40);

      if(!results.length) {
        $list.innerHTML = '<div style="padding:40px; text-align:center; color:var(--muted)">No results found.</div>';
        return;
      }

      $list.innerHTML = results.map(r => `
        <div class="row">
          <div class="left">
            <div class="main">${highlight(r.suburb, query)} <span style="color:var(--muted)">${highlight(r.postcode, query)}</span></div>
            <div class="meta">
              <span>${r.depot}</span>
              <span class="badge">${r.cage}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterBy(val) {
      currentFilter = val;
      document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', c.innerText === (val || 'All'));
      });
      render();
    }

    $q.addEventListener("input", render);
    render();
  </script>
</body>
</html>
